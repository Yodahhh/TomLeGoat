api:
  dashboard: true

entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"

certificatesResolvers:
  infomaniak:
    acme:
      email: your-email@example.com   # <-- Remplacer par ton email
      storage: /acme.json
      dnsChallenge:
        provider: infomaniak           # Voir providers: https://doc.traefik.io/traefik/https/acme/#providers
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik_network
  file:
    filename: /config.yml
    watch: true

log:
  level: INFO   # DEBUG en développement, INFO en production
